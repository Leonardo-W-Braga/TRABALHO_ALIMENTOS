name: Pipeline Completo

on: [push]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências Python
        run: pip install pytest mysql-connector-python

      # ⭐ usar MySQL que já existe no runner
      - name: Iniciar MySQL
        run: sudo /etc/init.d/mysql start

      - name: Criar banco e usuário
        run: |
          sudo mysql -e "CREATE DATABASE estoque_frutas;"
          sudo mysql -e "CREATE USER 'appuser'@'localhost' IDENTIFIED BY '1234';"
          sudo mysql -e "GRANT ALL PRIVILEGES ON estoque_frutas.* TO 'appuser'@'localhost';"
          sudo mysql -e "FLUSH PRIVILEGES;"

      - name: Criar tabelas
        run: |
          mysql -u appuser -p1234 estoque_frutas < db_alimentos.sql

      - name: Rodar testes
        run: pytest