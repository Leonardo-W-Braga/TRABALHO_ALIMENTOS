name: Pipeline Completo

on: [push]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências Python
        run: pip install pytest mysql-connector-python

      # 🔵 iniciar mysql do próprio runner
      - name: Iniciar MySQL
        run: sudo service mysql start

      # 🔵 aguardar mysql iniciar
      - name: Aguardar MySQL
        run: sleep 5

      # 🔵 criar banco e usuário (usando sudo sem senha - auth_socket)
      - name: Criar banco e usuário
        run: |
          sudo mysql <<EOF
          CREATE DATABASE IF NOT EXISTS estoque_frutas;
          CREATE USER IF NOT EXISTS 'appuser'@'localhost' IDENTIFIED BY '1234';
          GRANT ALL PRIVILEGES ON estoque_frutas.* TO 'appuser'@'localhost';
          FLUSH PRIVILEGES;
          EOF

      # 🔵 criar tabelas
      - name: Criar tabelas
        run: |
          mysql -uappuser -p1234 estoque_frutas < db_alimentos.sql

      # 🔵 rodar testes
      - name: Rodar testes
        run: pytest