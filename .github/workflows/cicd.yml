name: Pipeline Completo

on: [push]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql/mysql-server:8.0
        env:
          MYSQL_ROOT_PASSWORD: 1234
          MYSQL_DATABASE: estoque_frutas
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -p1234"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install pytest mysql-connector-python

      - name: Esperar MySQL ficar pronto
        run: |
          echo "Aguardando MySQL..."
          sleep 20

      - name: Criar tabelas
        run: |
          mysql -h 127.0.0.1 -u root -p1234 estoque_frutas < db_alimentos.sql

      - name: Rodar testes
        run: pytest