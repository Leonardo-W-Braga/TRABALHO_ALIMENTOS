name: Pipeline Completo

on: [push]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências Python
        run: pip install pytest mysql-connector-python

      - name: Instalar MySQL 8.0
        run: |
          sudo apt-get update
          # Adicionar repositório oficial do MySQL
          sudo apt-get install -y wget
          wget https://dev.mysql.com/get/mysql-apt-config_0.8.24-1_all.deb
          sudo dpkg -i mysql-apt-config_0.8.24-1_all.deb
          sudo apt-get update
          sudo apt-get install -y mysql-server
          sudo service mysql start
          sleep 5

      - name: Configurar MySQL
        run: |
          sudo mysql -e "CREATE DATABASE IF NOT EXISTS estoque_frutas;"
          sudo mysql -e "CREATE USER IF NOT EXISTS 'appuser'@'localhost' IDENTIFIED BY '1234';"
          sudo mysql -e "GRANT ALL PRIVILEGES ON estoque_frutas.* TO 'appuser'@'localhost';"
          sudo mysql -e "FLUSH PRIVILEGES;"

      - name: Verificar versão do MySQL
        run: mysql --version

      - name: Criar tabelas
        run: |
          mysql -uappuser -p1234 estoque_frutas < db_alimentos.sql

      - name: Rodar testes
        run: pytest